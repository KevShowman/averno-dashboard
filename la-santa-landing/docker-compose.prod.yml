services:
  la-santa-landing:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: la-santa-landing-prod
    ports:
      - "8081:80"
    restart: always
    networks:
      - la-santa-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  la-santa-network:
    driver: bridge

