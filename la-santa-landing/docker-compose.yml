services:
  la-santa-landing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: la-santa-landing
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - la-santa-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  la-santa-network:
    driver: bridge

