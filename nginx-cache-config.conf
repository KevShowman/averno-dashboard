# Nginx Cache-Header Konfiguration für LaSanta Calavera
# Diese Konfiguration verhindert stale cache Probleme

# index.html: NIEMALS cachen - immer frisch
location = /index.html {
  add_header Cache-Control "no-cache, no-store, must-revalidate";
  add_header Pragma "no-cache";
  add_header Expires 0;
  add_header Last-Modified $date_gmt;
  add_header ETag "";
}

# Service Worker: NIEMALS cachen
location = /sw.js {
  add_header Cache-Control "no-cache, no-store, must-revalidate";
  add_header Pragma "no-cache";
  add_header Expires 0;
}

# version.json: NIEMALS cachen
location = /version.json {
  add_header Cache-Control "no-cache, no-store, must-revalidate";
  add_header Pragma "no-cache";
  add_header Expires 0;
}

# API Endpoints: NIEMALS cachen
location /api/ {
  add_header Cache-Control "no-cache, no-store, must-revalidate";
  add_header Pragma "no-cache";
  add_header Expires 0;
}

# Statische, fingerprinted Assets: LANGE cachen (1 Jahr)
location /assets/ {
  add_header Cache-Control "public, max-age=31536000, immutable";
  add_header Vary "Accept-Encoding";
}

# CSS/JS Dateien mit Hash: LANGE cachen
location ~* \.(js|css)$ {
  if ($uri ~* \.[a-f0-9]{8,}\.(js|css)$) {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
  if ($uri !~* \.[a-f0-9]{8,}\.(js|css)$) {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}

# Bilder: Mittlere Cache-Zeit
location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
  add_header Cache-Control "public, max-age=86400";
  add_header Vary "Accept-Encoding";
}

# Fonts: Lange Cache-Zeit
location ~* \.(woff|woff2|ttf|eot)$ {
  add_header Cache-Control "public, max-age=31536000, immutable";
  add_header Vary "Accept-Encoding";
}

# Manifest und andere App-Dateien: Kurze Cache-Zeit
location ~* \.(json|xml|txt)$ {
  add_header Cache-Control "public, max-age=3600";
}
