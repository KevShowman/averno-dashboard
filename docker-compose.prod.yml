services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: lasanta-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lasanta
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lasanta_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lasanta -d lasanta_db"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lasanta-network

  # NestJS API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    container_name: lasanta-api
    restart: unless-stopped
    command: ["node", "dist/src/main.js"]
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://lasanta:${POSTGRES_PASSWORD}@db:5432/lasanta_db?schema=public"
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: 3000
      JWT_SECRET: "${JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID}"
      DISCORD_REDIRECT_URI: "${FRONTEND_URL}/api/auth/discord/callback"
      FRONTEND_URL: "${FRONTEND_URL}"
      API_BASE_URL: "${API_BASE_URL}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    networks:
      - lasanta-network

  # React Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    container_name: lasanta-web
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - lasanta-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: lasanta-nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
    networks:
      - lasanta-network

volumes:
  postgres_data:
    driver: local
  api_uploads:
    driver: local
  api_logs:
    driver: local

networks:
  lasanta-network:
    driver: bridge
