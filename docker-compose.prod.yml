services:
  # NestJS API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    container_name: lasanta-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: 3000
      JWT_SECRET: "${JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID}"
      DISCORD_REDIRECT_URI: "${DISCORD_REDIRECT_URI}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL}"
      DISCORD_ABMELDUNG_WEBHOOK_URL: "${DISCORD_ABMELDUNG_WEBHOOK_URL}"
      FRONTEND_URL: "${FRONTEND_URL}"
      API_BASE_URL: "${API_BASE_URL}"
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    networks:
      - lasanta-network

  # React Frontend (internal Nginx)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    container_name: lasanta-web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - lasanta-network

volumes:
  api_uploads:
    driver: local
  api_logs:
    driver: local

networks:
  lasanta-network:
    driver: bridge
