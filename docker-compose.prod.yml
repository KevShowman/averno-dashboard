services:
  # NestJS API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: lasanta-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: 3000
      JWT_SECRET: "${JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID}"
      DISCORD_REDIRECT_URI: "${DISCORD_REDIRECT_URI}"
      FRONTEND_URL: "${FRONTEND_URL}"
      API_BASE_URL: "${API_BASE_URL}"
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    networks:
      - lasanta-network

  # React Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    container_name: lasanta-web
    restart: unless-stopped
    expose:
      - "80"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - lasanta-network

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: lasanta-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
    networks:
      - lasanta-network

volumes:
  api_uploads:
    driver: local
  api_logs:
    driver: local

networks:
  lasanta-network:
    driver: bridge
